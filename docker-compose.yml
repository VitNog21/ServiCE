services:
  backend:
    build: ./service-backend
    container_name: service-backend
    ports:
      - "3000:3000"
    env_file:
      - ./service-backend/.env
    volumes:
      - ./service-backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./service-frontend
      args:
        - VITE_SUPABASE_URL=${SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
        - VITE_API_URL=http://localhost:3000
    env_file:
      - ./.env
    container_name: service-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./service-frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  tunnel:
    image: ngrok/ngrok:latest
    restart: always
    tty: true
    stdin_open: true
    env_file:
      - ./.env
    command:
      - "http"
      - "--domain=${NGROK_DOMAIN}"
      - "backend:3000"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - backend
