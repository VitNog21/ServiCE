name: CI/CD com Infisical

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # 1. Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './service-backend/package-lock.json'

      # 2. Instalar dependências e rodar Build
      - name: Build Backend
        run: |
          cd service-backend
          npm install
        env:
          # Segredos vindos diretamente do GitHub Secrets
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MERCADO_PAGO_ACCESS_TOKEN: ${{ secrets.MERCADO_PAGO_ACCESS_TOKEN }}

      # 3. Build Docker (Exemplo de como passar variáveis para o build)
      - name: Build Docker Image
        run: |
          docker build \
            --build-arg SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            -t meu-backend ./service-backend
