name: ServiCE Staging - CI/CD

on:
  push:
    branches: [ dev ]
  workflow_dispatch: # Permite rodar manualmente

jobs:
  # JOB 1: VALIDAR AMBIENTE (LINT E BUILD)
  validate:
    name: Build & Validate Containers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Container (Test)
        uses: docker/build-push-action@v5
        with:
          context: ./service-backend
          push: false
          tags: service-backend:test

      - name: Build Frontend Container (Test)
        uses: docker/build-push-action@v5
        with:
          context: ./service-frontend
          push: false
          tags: service-frontend:test

  # JOB 2: DEPLOY PARA STAGING
  # Nota: Este job depende do sucesso do Job 1
  deploy-staging:
    name: Deploy to Staging
    needs: validate
    runs-on: ubuntu-latest
    # Aqui você conectaria com seu provider (Render, Railway, etc)
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log Deployment Start
        run: echo "🚀 Iniciando deploy automático para ambiente de quebra (Staging)..."

