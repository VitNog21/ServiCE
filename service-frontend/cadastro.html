<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServiCE - Cadastro</title>
  <link rel="stylesheet" href="./css/login.css">
</head>
<body class="login-body">

  <div class="login-card">
    <a href="index.html">
      <img src="./assets/logo_service.png" alt="ServiCE Logo" class="login-logo">
    </a>
    
    <h2 class="login-title">Crie sua conta</h2>

    <form id="register-form">
      <div class="input-group">
        <label for="name">Nome Completo</label>
        <input type="text" id="name" placeholder="João da Silva" required>
      </div>

      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>
      
      <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Crie uma senha forte" required>
      </div>

      <div class="input-group">
        <label for="confirm-password">Confirme a Senha</label>
        <input type="password" id="confirm-password" placeholder="Repita a senha" required>
      </div>
      
      <button type="submit" class="btn-primary">Criar Conta</button>
    </form>

    <div class="divider">ou</div>

    <button id="btn-google-register" type="button" class="btn-google">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
      Cadastrar com Google
    </button>

    <p class="register-link">Já tem uma conta? <a href="login.html">Entrar</a></p>
  </div>

  <script src="./js/cadastro.js"></script>
</body>
</html>
