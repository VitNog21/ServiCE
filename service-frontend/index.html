<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServiCE - Classificados</title>
  <link rel="stylesheet" href="./css/style.css"> 
</head>
<body class="home-container">

  <header class="header">
    <img src="./assets/logo_service.png" alt="ServiCE Logo" class="logo" />
    <div class="search-container">
      <input type="text" placeholder="Estou procurando por..." class="search-input" />
    </div>
    <button class="btn-login">Entrar / Cadastrar</button>
  </header>

  <section class="banner-section">
    <div class="banner-content">
      <h2 class="banner-title">Descubra os melhores anúncios</h2>
    </div>
  </section>

  <main class="main-content">
    <h3 class="section-title">Explorar Categorias</h3>
    
    <div id="loading-msg">Carregando categorias...</div>
    <div id="error-msg" style="color: red; display: none;"></div>
    
    <div id="category-grid" class="category-grid"></div>
  </main>

  <script src="./js/script.js"></script> 
</body>
</html>
